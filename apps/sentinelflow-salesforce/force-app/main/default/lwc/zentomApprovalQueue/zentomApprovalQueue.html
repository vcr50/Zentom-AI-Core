<template>
    <div class="approval-queue-container">
        
        <!-- Header -->
        <header class="queue-header">
            <div class="header-content">
                <div class="title-section">
                    <div class="icon-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                    </div>
                    <div>
                        <h1>Zentom Guardian Gate</h1>
                        <p>Human Approval Queue for Autonomous Operations</p>
                    </div>
                </div>
                
                <div class="stats-section">
                    <div class="stat-box">
                        <span class="stat-label">Pending</span>
                        <span class="stat-value">{approvalCount}</span>
                    </div>
                    <button class="refresh-btn" onclick={loadApprovals} disabled={isLoading}>
                        <svg class={refreshIconClass} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 2v6h-6"></path>
                            <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
                            <path d="M3 22v-6h6"></path>
                            <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
                        </svg>
                        Refresh
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="queue-body">
            
            <template if:true={isLoading}>
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Securing connection to Zentom AI...</p>
                </div>
            </template>
            
            <template if:false={isLoading}>
                <template if:false={hasApprovals}>
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        <h2>All Clear</h2>
                        <p>There are currently no workflows awaiting human approval.</p>
                    </div>
                </template>

                <template if:true={hasApprovals}>
                    <div class="card-grid">
                        <template for:each={approvals} for:item="wf">
                            <div key={wf.workflowId} class="approval-card">
                                
                                <!-- Card Header -->
                                <div class="card-header">
                                    <div>
                                        <div class="workflow-id">ZRL-{wf.paddedId}</div>
                                        <h3 class="incident-id">{wf.incidentId}</h3>
                                    </div>
                                    <div class="ttl-badge">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <circle cx="12" cy="12" r="10"></circle>
                                            <polyline points="12 6 12 12 16 14"></polyline>
                                        </svg>
                                        Expires in {wf.ttl}
                                    </div>
                                </div>
                                
                                <!-- Core Details -->
                                <div class="card-body">
                                    <div class="detail-row highlight-row">
                                        <span class="detail-label">Proposed Action</span>
                                        <span class="detail-value action-value">{wf.proposedAction}</span>
                                    </div>
                                    
                                    <div class="metrics-grid">
                                        <div class="metric">
                                            <span class="metric-label">AI Confidence</span>
                                            <span class={wf.confidenceClass}>{wf.confidence}%</span>
                                        </div>
                                        <div class="metric">
                                            <span class="metric-label">Risk Score</span>
                                            <span class="metric-value">{wf.riskScore}</span>
                                        </div>
                                    </div>
                                    
                                    <div class="policy-box">
                                        <div class="policy-header">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                                                <line x1="12" y1="9" x2="12" y2="13"></line>
                                                <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                            </svg>
                                            Policy Enforcement Triggered
                                        </div>
                                        <p>{wf.policyReasoning}</p>
                                    </div>
                                </div>
                                
                                <!-- Actions -->
                                <div class="card-actions">
                                    <button class="btn btn-reject" data-id={wf.workflowId} onclick={handleReject}>
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <line x1="18" y1="6" x2="6" y2="18"></line>
                                            <line x1="6" y1="6" x2="18" y2="18"></line>
                                        </svg>
                                        Reject
                                    </button>
                                    <button class="btn btn-approve" data-id={wf.workflowId} onclick={handleApprove}>
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <polyline points="20 6 9 17 4 12"></polyline>
                                        </svg>
                                        Approve Action
                                    </button>
                                </div>

                            </div>
                        </template>
                    </div>
                </template>
            </template>
            
        </div>
    </div>
</template>
