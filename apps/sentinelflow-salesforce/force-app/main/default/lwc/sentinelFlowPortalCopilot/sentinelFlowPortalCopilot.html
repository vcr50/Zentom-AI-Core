<template>
    <div class="copilot-panel">
        <div class="copilot-header">
            <div class="copilot-title">
                <lightning-icon icon-name="utility:einstein" size="small" class="copilot-icon"></lightning-icon>
                <span>Zentom Hybrid AI</span>
            </div>
            <div class="header-right">
                <div class="view-tabs">
                    <button class={missionTabClass} onclick={showMission}>Mission Control</button>
                    <button class={chatTabClass} onclick={showChat}>Chat</button>
                    <button class={archTabClass} onclick={showArch}>Architecture</button>
                </div>
                <span class="agentforce-badge">Zentom Gen AI + Agentforce</span>
            </div>
        </div>

        <!-- Mission Control View -->
        <template if:true={isMissionView}>
            <c-zentom-dashboard></c-zentom-dashboard>
        </template>

        <!-- Chat View -->
        <template if:true={isChatView}>
            <div class="copilot-chat">
                <template for:each={messages} for:item="msg">
                    <div key={msg.id} class={msg.msgClass}>
                        <div class="msg-bubble">{msg.content}</div>
                    </div>
                </template>
                
                <template if:true={isTyping}>
                    <div class="msg-row ai">
                        <div class="msg-bubble typing">
                            <span>.</span><span>.</span><span>.</span>
                        </div>
                    </div>
                </template>
            </div>

            <div class="copilot-quick-actions">
                <template for:each={quickActions} for:item="action">
                    <button key={action} class="quick-action-btn" onclick={handleQuickAction}>{action}</button>
                </template>
            </div>

            <div class="copilot-input-area">
                <input 
                    type="text" 
                    class="copilot-input" 
                    placeholder="Ask Zentom Hybrid AI..." 
                    value={currentInput}
                    oninput={handleInputChange}
                    onkeypress={handleKeyPress}
                />
                <button class="copilot-send" onclick={sendMessage}>
                    <lightning-icon icon-name="utility:send" size="x-small"></lightning-icon>
                </button>
            </div>
        </template>

        <!-- Architecture View -->
        <template if:true={isArchView}>
            <div class="arch-wrapper">
                <c-sentinel-flow-zentom-architecture theme={theme}></c-sentinel-flow-zentom-architecture>
            </div>
        </template>
    </div>
</template>
