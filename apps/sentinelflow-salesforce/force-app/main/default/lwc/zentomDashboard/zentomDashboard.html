<template>
    <section class="dashboard">
        <!-- ── Header ──────────────────────────────────────────────── -->
        <header class="dashboard-header">
            <div>
                <p class="eyebrow">Salesforce Operations Control Tower</p>
                <h1>SentinelFlow Command Center</h1>
                <p class="header-subtitle">Live incident radar, approval clearance, action tracking, and replay evidence powered by the Zentom AI OS.</p>
            </div>
            <div class="header-actions">
                <!-- Near-realtime freshness pill -->
                <span class="freshness-pill" title="Auto-refreshes every 30 seconds">
                    <span class="freshness-dot"></span>
                    Near Realtime · {freshnessLabel}
                </span>
                <div class="refresh-meta">
                    <span class="range-label">Last refreshed</span>
                    <strong>{lastRefreshedLabel}</strong>
                </div>
                <lightning-button-icon
                    icon-name="utility:refresh"
                    alternative-text="Refresh dashboard"
                    title="Refresh dashboard"
                    onclick={handleRefresh}
                ></lightning-button-icon>
                <div class="range-controls" aria-label="Dashboard date range">
                    <lightning-button-group>
                        <lightning-button label="Today" data-range="TODAY" onclick={handleRangeChange}></lightning-button>
                        <lightning-button label="Last 7 Days" data-range="LAST_7_DAYS" onclick={handleRangeChange}></lightning-button>
                        <lightning-button label="All" data-range="ALL" onclick={handleRangeChange}></lightning-button>
                    </lightning-button-group>
                    <span class="range-label">{activeRangeLabel}</span>
                </div>
            </div>
        </header>

        <!-- ── Milestone 43: Filter Panel ─────────────────────────── -->
        <div class="filter-bar">
            <button class={filterToggleClass} onclick={handleToggleFilters}>
                <lightning-icon icon-name="utility:filterList" size="x-small"></lightning-icon>
                <span>Filters</span>
                <template if:true={hasActiveFilters}>
                    <span class="filter-count-badge">{activeFilterCount}</span>
                </template>
            </button>
            <template if:true={hasActiveFilters}>
                <button class="filter-clear-btn" onclick={handleClearFilters}>
                    <lightning-icon icon-name="utility:close" size="x-small"></lightning-icon>
                    Clear filters
                </button>
            </template>
        </div>

        <template if:true={isFilterOpen}>
            <div class="filters-container">
                <div class="filter-group">
                    <label class="filter-label">Risk Level</label>
                    <lightning-combobox
                        name="filterRisk"
                        value={filterRisk}
                        options={riskOptions}
                        onchange={handleFilterRiskChange}
                        variant="label-hidden"
                    ></lightning-combobox>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Incident Status</label>
                    <lightning-combobox
                        name="filterStatus"
                        value={filterStatus}
                        options={statusOptions}
                        onchange={handleFilterStatusChange}
                        variant="label-hidden"
                    ></lightning-combobox>
                </div>
            </div>
        </template>

        <template if:true={data}>
            <!-- ── Control Tower Strip ─────────────────────────────── -->
            <section class="tower-strip" aria-label="Control tower focus areas">
                <div>
                    <span>Org posture</span>
                    <strong>{data.summary.orgHealthStatus}</strong>
                </div>
                <div>
                    <span>Awaiting clearance</span>
                    <strong>{data.summary.pendingApprovals}</strong>
                    <span class={approvalTrendClass}>{approvalTrendLabel}</span>
                </div>
                <div>
                    <span>Critical traffic</span>
                    <strong>{data.summary.criticalIncidents}</strong>
                    <span class={criticalTrendClass}>{criticalTrendLabel}</span>
                </div>
                <div>
                    <span>Cleared actions</span>
                    <strong>{data.summary.executedActions}</strong>
                </div>
                <div>
                    <span>Flight recorder</span>
                    <strong>{data.summary.recentReplayEvents}</strong>
                </div>
            </section>

            <!-- ── Org Health Card ────────────────────────────────── -->
            <article class={orgHealthClass}>
                <div class="health-main">
                    <div>
                        <span class="section-label">Org Health Radar</span>
                        <div class="health-score">
                            <strong>{data.summary.orgHealthScore}</strong>
                            <span>/ 100</span>
                        </div>
                    </div>
                    <div class="health-status">{data.summary.orgHealthStatus}</div>
                </div>
                <p class="health-reason">{data.summary.orgHealthReason}</p>
                <div class="health-meta">
                    <span>{summaryTotalIncidents} incidents</span>
                    <span>{summaryPendingApprovals} pending approvals</span>
                    <span>{summaryCriticalIncidents} critical</span>
                    <span>{lastRefreshedLabel}</span>
                </div>
            </article>

            <!-- ── KPI Metric Grid ─────────────────────────────────── -->
            <section class="kpi-grid" aria-label="Dashboard summary metrics">
                <article class="metric">
                    <lightning-icon icon-name="utility:record" size="x-small"></lightning-icon>
                    <span>Live Incidents</span>
                    <strong>{summaryTotalIncidents}</strong>
                    <p>Traffic in view</p>
                </article>
                <article class="metric critical">
                    <lightning-icon icon-name="utility:warning" size="x-small"></lightning-icon>
                    <span>Critical Traffic</span>
                    <strong>{summaryCriticalIncidents}</strong>
                    <p class={criticalTrendClass}>{criticalTrendLabel}</p>
                </article>
                <article class="metric warning">
                    <lightning-icon icon-name="utility:approval" size="x-small"></lightning-icon>
                    <span>Awaiting Clearance</span>
                    <strong>{summaryPendingApprovals}</strong>
                    <p class={approvalTrendClass}>{approvalTrendLabel}</p>
                </article>
                <article class="metric success">
                    <lightning-icon icon-name="utility:success" size="x-small"></lightning-icon>
                    <span>Cleared Actions</span>
                    <strong>{summaryExecutedActions}</strong>
                    <p>Governed action</p>
                </article>
                <article class="metric success">
                    <lightning-icon icon-name="standard:case" size="x-small"></lightning-icon>
                    <span>Cases Created</span>
                    <strong>{data.summary.recentCasesCreated}</strong>
                    <p>Salesforce Cases</p>
                </article>
                <article class="metric danger">
                    <lightning-icon icon-name="utility:error" size="x-small"></lightning-icon>
                    <span>Failed Actions</span>
                    <strong>{failedExecutionLabel}</strong>
                    <p>Derived from incidents</p>
                </article>
                <article class="metric">
                    <lightning-icon icon-name="utility:preview" size="x-small"></lightning-icon>
                    <span>Flight Recorder</span>
                    <strong>{summaryReplayEvents}</strong>
                    <p>Audit trail</p>
                </article>
                <article class="metric runbook">
                    <lightning-icon icon-name="utility:flow" size="x-small"></lightning-icon>
                    <span>Top Runbook</span>
                    <strong>{topRunbook}</strong>
                    <p>Most observed</p>
                </article>
            </section>

            <!-- ── Clearance Queue + Tower Systems ───────────────── -->
            <section class="content-grid">
                <article class="panel panel-priority">
                    <header class="panel-header">
                        <div>
                            <span class="section-label">Clearance Queue</span>
                            <h2>Pending approvals</h2>
                        </div>
                        <span class="panel-count">{data.summary.pendingApprovals}</span>
                    </header>
                    <template if:true={hasPendingApprovals}>
                        <div class="approval-list">
                            <template for:each={pendingApprovals} for:item="incident">
                                <div class="approval-row" key={incident.id}>
                                    <div>
                                        <button class="link primary-link" data-id={incident.id} onclick={openIncident}>
                                            {incident.name}
                                        </button>
                                        <p>{incident.incidentType}</p>
                                    </div>
                                    <span class={incident.riskClass}>{incident.riskLabel}</span>
                                    <div class="approval-detail">
                                        <span>{incident.policyDecision}</span>
                                        <span>{incident.recommendedActionLabel}</span>
                                    </div>
                                    <div class="approval-action">
                                        <lightning-button
                                            label="Review"
                                            variant="brand"
                                            data-id={incident.id}
                                            onclick={openIncident}
                                        ></lightning-button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template if:false={hasPendingApprovals}>
                        <p class="empty">No incidents are waiting for clearance.</p>
                    </template>
                </article>

                <article class="panel system-panel">
                    <header class="panel-header">
                        <div>
                            <span class="section-label">Tower Systems</span>
                            <h2>API and execution posture</h2>
                        </div>
                        <span class={systemHealthClass}>{systemHealthLabel}</span>
                    </header>
                    <div class="system-list">
                        <div>
                            <span>Zentom API status</span>
                            <strong>Loaded</strong>
                        </div>
                        <div>
                            <span>Hosted DB status</span>
                            <strong>{hostedDbStatusLabel}</strong>
                        </div>
                        <div>
                            <span>Latest error log</span>
                            <strong>{latestErrorLogLabel}</strong>
                        </div>
                        <div>
                            <span>Error count</span>
                            <strong>{failedExecutionLabel}</strong>
                        </div>
                        <div>
                            <span>Poll interval</span>
                            <strong>30 s</strong>
                        </div>
                        <div>
                            <span>Freshness</span>
                            <strong>{freshnessLabel}</strong>
                        </div>
                    </div>
                </article>
            </section>

            <!-- ── Live Traffic Board (filtered) ─────────────────── -->
            <section class="panel">
                <header class="panel-header">
                    <div>
                        <span class="section-label">Live Traffic Board</span>
                        <h2>Recent incidents</h2>
                    </div>
                    <span class="panel-subtitle">{activeRangeLabel}</span>
                </header>
                <template if:true={hasFilteredIncidents}>
                    <div class="table-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <th>Incident</th>
                                    <th>Type</th>
                                    <th>Environment</th>
                                    <th>Risk</th>
                                    <th>Policy</th>
                                    <th>Status</th>
                                    <th>Runbook</th>
                                    <th>Approval</th>
                                    <th>Created</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={filteredIncidents} for:item="incident">
                                    <tr key={incident.id}>
                                        <td>
                                            <button class="link primary-link" data-id={incident.id} onclick={openIncident}>
                                                {incident.name}
                                            </button>
                                        </td>
                                        <td>{incident.incidentType}</td>
                                        <td>{incident.environmentLabel}</td>
                                        <td><span class={incident.riskClass}>{incident.riskLabel}</span></td>
                                        <td>{incident.policyDecision}</td>
                                        <td><span class={incident.statusClass}>{incident.status}</span></td>
                                        <td>{incident.runbookKey}</td>
                                        <td>{incident.approvalStatus}</td>
                                        <td>{incident.createdLabel}</td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
                <template if:false={hasFilteredIncidents}>
                    <p class="empty">No incidents match the current filters.</p>
                </template>
            </section>

            <!-- ── Cleared Actions + Case Outcomes ───────────────── -->
            <section class="content-grid">
                <article class="panel">
                    <header class="panel-header">
                        <div>
                            <span class="section-label">Cleared Actions</span>
                            <h2>Executed actions</h2>
                        </div>
                    </header>
                    <template if:true={hasRecentExecutions}>
                        <template for:each={recentExecutions} for:item="incident">
                            <div class="compact-row execution-row" key={incident.id}>
                                <button class="link primary-link" data-id={incident.id} onclick={openIncident}>{incident.name}</button>
                                <span>{incident.executionAction}</span>
                                <span>
                                    <template if:true={incident.createdCaseId}>
                                        <button class="link" data-id={incident.createdCaseId} onclick={openCase}>
                                            {incident.caseLabel}
                                        </button>
                                    </template>
                                    <template if:false={incident.createdCaseId}>
                                        {incident.caseLabel}
                                    </template>
                                </span>
                                <span class={incident.executionClass}>{incident.executionStatus}</span>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasRecentExecutions}>
                        <p class="empty">No cleared actions in this range.</p>
                    </template>
                </article>

                <article class="panel">
                    <header class="panel-header">
                        <div>
                            <span class="section-label">Case Outcomes</span>
                            <h2>Created cases</h2>
                        </div>
                    </header>
                    <template if:true={hasRecentCasesCreated}>
                        <template for:each={recentCasesCreated} for:item="incident">
                            <div class="compact-row case-row" key={incident.id}>
                                <button class="link primary-link" data-id={incident.id} onclick={openIncident}>{incident.name}</button>
                                <button class="link" data-id={incident.createdCaseId} onclick={openCase}>
                                    {incident.caseLabel}
                                </button>
                                <span>{incident.executionAction}</span>
                                <span>{incident.executedLabel}</span>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasRecentCasesCreated}>
                        <p class="empty">No cases created in this range.</p>
                    </template>
                </article>
            </section>

            <!-- ── Flight Recorder ───────────────────────────────── -->
            <section class="panel">
                <header class="panel-header">
                    <div>
                        <span class="section-label">Flight Recorder</span>
                        <h2>Replay timeline</h2>
                    </div>
                    <span class="panel-subtitle">{data.summary.recentReplayEvents} audit events</span>
                </header>
                <template if:true={hasRecentReplayEvents}>
                    <div class="timeline">
                        <template for:each={recentReplayEvents} for:item="event">
                            <div class="timeline-row" key={event.id}>
                                <span class="timeline-marker"></span>
                                <div>
                                    <button class="link primary-link" data-id={event.incidentId} onclick={openIncident}>
                                        {event.incidentName}
                                    </button>
                                    <p>{event.eventType}</p>
                                </div>
                                <span class={event.decisionClass}>{event.decision}</span>
                                <span>{event.createdLabel}</span>
                            </div>
                        </template>
                    </div>
                </template>
                <template if:false={hasRecentReplayEvents}>
                    <p class="empty">No replay events in this range.</p>
                </template>
            </section>
        </template>

        <template if:true={errorMessage}>
            <div class="error">{errorMessage}</div>
        </template>

        <template if:true={showLoading}>
            <lightning-spinner alternative-text="Loading dashboard" size="medium"></lightning-spinner>
        </template>
    </section>
</template>
